<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="30" cy="30" r="25" fill="#2563eb" opacity="0.1"/>
  
  <!-- Main Trash Can -->
  <rect x="18" y="22" width="24" height="20" rx="2" fill="#2563eb"/>
  <rect x="16" y="20" width="28" height="3" rx="1.5" fill="#1d4ed8"/>
  
  <!-- Trash Can Handle -->
  <rect x="24" y="17" width="3" height="4" fill="#1d4ed8"/>
  <rect x="33" y="17" width="3" height="4" fill="#1d4ed8"/>
  
  <!-- Swipe Motion Lines -->
  <path d="M45 20 L52 20" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 26 L50 26" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 32 L48 32" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Sparkles for "Clean" Effect -->
  <circle cx="42" cy="15" r="1.5" fill="#fbbf24"/>
  <circle cx="48" cy="12" r="1" fill="#fbbf24"/>
  <circle cx="52" cy="16" r="1.5" fill="#fbbf24"/>
  <circle cx="46" cy="38" r="1" fill="#fbbf24"/>
  <circle cx="40" cy="40" r="1.5" fill="#fbbf24"/>
  
  <!-- Text "SwipeeClean" -->
  <text x="70" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">
    Swipee
  </text>
  <text x="70" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2563eb">
    Clean
  </text>
</svg>