workflows:
  ios-workflow:
    name: SwipeeClean iOS Build
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Fresh start - ignore all existing files
        script: |
          mkdir -p backup
          mv *.json backup/ 2>/dev/null || true
          mv *.ts backup/ 2>/dev/null || true
          mv *.js backup/ 2>/dev/null || true
          mv node_modules backup/ 2>/dev/null || true
          
          # Create web content
          mkdir -p www
          cat > www/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>SwipeeClean Smart</title>
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                  body { 
                      font-family: -apple-system, sans-serif; 
                      margin: 0; padding: 20px; 
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
                      color: white; min-height: 100vh; text-align: center; 
                  }
                  .feature { 
                      background: rgba(255,255,255,0.1); 
                      padding: 20px; margin: 15px auto; 
                      border-radius: 15px; max-width: 500px; 
                  }
                  .logo { font-size: 4em; margin-bottom: 20px; }
                  .price { background: rgba(255,255,255,0.2); font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="logo">🧹</div>
              <h1>SwipeeClean Smart</h1>
              <p>Premium Storage Optimization for iOS</p>
              <div class="feature"><h3>🚀 Smart Storage Analysis</h3><p>AI-powered scanning</p></div>
              <div class="feature"><h3>📱 Duplicate Detection</h3><p>Remove duplicate files</p></div>
              <div class="feature price"><h3>💰 Premium: $4.99/month</h3><p>Unlock all features</p></div>
              <div class="feature"><h3>🛡️ Spam Blocking</h3><p>Call & text protection</p></div>
              <div class="feature"><h3>📸 Photo Organization</h3><p>Smart media management</p></div>
              <div class="feature"><h3>⚡ Performance Boost</h3><p>Speed optimization</p></div>
              <div style="margin-top: 40px; padding: 25px; background: rgba(255,255,255,0.15); border-radius: 20px; max-width: 500px; margin-left: auto; margin-right: auto;">
                  <h2>🎯 SwipeeClean Smart</h2>
                  <p><strong>Professional Storage Management</strong></p>
              </div>
          </body>
          </html>
          EOF
          
      - name: Initialize Capacitor
        script: |
          echo '{"name": "swipeeclean", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init "SwipeeClean Smart" com.swipeeclean.smart --web-dir=www
          npx cap add ios
          npx cap sync ios
          
      - name: Verify web content
        script: |
          echo "=== Checking web content ==="
          ls -la www/
          echo "=== HTML content ==="
          head -20 www/index.html
          echo "=== iOS app content ==="
          ls -la ios/App/App/public/
          
      - name: Build for iOS Simulator with content
        script: |
          cd ios/App
          
          # Build for simulator
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' -derivedDataPath build clean build
          
          # Verify the build
          echo "=== Build products ==="
          ls -la build/Build/Products/Debug-iphonesimulator/
          
          # Create proper app package
          APP_PATH="build/Build/Products/Debug-iphonesimulator/App.app"
          if [ -d "$APP_PATH" ]; then
            echo "=== App contents ==="
            ls -la "$APP_PATH"
            
            # Copy to artifacts location
            cp -r "$APP_PATH" SwipeeClean-Smart.app
            
            # Create info file
            echo "SwipeeClean Smart iOS App" > SwipeeClean-Info.txt
            echo "Built: $(date)" >> SwipeeClean-Info.txt
            echo "Bundle ID: com.swipeeclean.smart" >> SwipeeClean-Info.txt
            echo "Platform: iOS Simulator" >> SwipeeClean-Info.txt
            echo "" >> SwipeeClean-Info.txt
            echo "App Contents:" >> SwipeeClean-Info.txt
            ls -la "$APP_PATH" >> SwipeeClean-Info.txt
          else
            echo "ERROR: App not found at $APP_PATH"
            exit 1
          fi
          
    artifacts:
      - ios/App/SwipeeClean-Smart.app
      - ios/App/SwipeeClean-Info.txt
      - ios/App/build/Build/Products/Debug-iphonesimulator/App.app
      
    publishing:
      email:
        recipients:
          - swipeeclean@gmail.com
        notify:
          success: true
          failure: true
