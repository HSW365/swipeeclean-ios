workflows:
  ios-workflow:
    name: SwipeeClean iOS Build
    max_build_duration: 120
    environment:
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Build iOS app
        script: |
          xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - swipeeclean@gmail.com
        notify:
          success: true
          failure: true
