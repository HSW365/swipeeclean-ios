workflows:
  ios-workflow:
    name: SwipeeClean iOS Build
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Fresh start - ignore all existing files
        script: |
          # Move ALL existing files out of the way
          mkdir -p backup
          mv *.json backup/ 2>/dev/null || true
          mv *.ts backup/ 2>/dev/null || true
          mv *.js backup/ 2>/dev/null || true
          mv node_modules backup/ 2>/dev/null || true
          
          # Create completely fresh setup
          mkdir -p www
          echo '<!DOCTYPE html>
          <html>
          <head>
              <title>SwipeeClean Smart</title>
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                  body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; 
                         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
                         color: white; min-height: 100vh; text-align: center; }
                  .feature { background: rgba(255,255,255,0.1); padding: 20px; margin: 15px auto; 
                            border-radius: 15px; max-width: 500px; }
                  .logo { font-size: 4em; margin-bottom: 20px; }
                  .price { background: rgba(255,255,255,0.2); font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="logo">🧹</div>
              <h1>SwipeeClean Smart</h1>
              <p>Premium Storage Optimization for iOS</p>
              <div class="feature"><h3>🚀 Smart Storage Analysis</h3><p>AI-powered scanning</p></div>
              <div class="feature"><h3>📱 Duplicate Detection</h3><p>Remove duplicate files</p></div>
              <div class="feature price"><h3>💰 Premium: $4.99/month</h3><p>Unlock all features</p></div>
              <div class="feature"><h3>🛡️ Spam Blocking</h3><p>Call & text protection</p></div>
              <div class="feature"><h3>📸 Photo Organization</h3><p>Smart media management</p></div>
              <div class="feature"><h3>⚡ Performance Boost</h3><p>Speed optimization</p></div>
              <div style="margin-top: 40px; padding: 25px; background: rgba(255,255,255,0.15); 
                          border-radius: 20px; max-width: 500px; margin-left: auto; margin-right: auto;">
                  <h2>🎯 SwipeeClean Smart</h2>
                  <p><strong>Professional Storage Management</strong></p>
              </div>
          </body>
          </html>' > www/index.html
          
      - name: Initialize Capacitor from scratch
        script: |
          # Create minimal package.json
          echo '{"name": "swipeeclean", "version": "1.0.0"}' > package.json
          
          # Install Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          
          # Initialize with JavaScript config (no TypeScript)
          npx cap init "SwipeeClean Smart" com.swipeeclean.smart --web-dir=www
          
          # Add iOS platform
          npx cap add ios
          
          # Sync files
          npx cap sync ios
          
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -destination generic/platform=iOS -archivePath App.xcarchive archive
          xcodebuild -exportArchive -archivePath App.xcarchive -exportPath . -exportOptionsPlist ../../exportOptions.plist
          
    artifacts:
      - ios/App/*.ipa
      - ios/App/App.xcarchive
      
    publishing:
      email:
        recipients:
          - swipeeclean@gmail.com
        notify:
          success: true
          failure: true

